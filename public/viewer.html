<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOSTREAM - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "mediasoup-client": "https://esm.sh/mediasoup-client@3.18.1"
        }
      }
    </script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-5xl flex flex-col gap-6">

        <header class="text-center">
            <h1
                class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-purple-500 tracking-tight">
                VELOSTREAM
            </h1>
            <div id="status"
                class="mt-2 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-300 text-sm">
                <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                Yayına Hazır
            </div>

            <!-- Viewer Count Badge -->
            <div
                class="mt-3 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/70 backdrop-blur-sm border border-slate-700 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-500" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                    <path fill-rule="evenodd"
                        d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                        clip-rule="evenodd" />
                </svg>
                <span class="text-slate-300 text-sm font-medium">İzleyici:</span>
                <span id="viewer-count-display" class="text-brand-500 font-bold text-base">0</span>
            </div>
        </header>

        <main
            class="bg-black rounded-2xl shadow-2xl overflow-hidden border border-slate-700 relative aspect-video group"
            id="videoContainer">

            <video id="remoteVideo" autoplay playsinline class="w-full h-full object-contain"></video>

            <!-- Custom Video Controls -->
            <div id="videoControls"
                class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/60 to-transparent p-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">

                <!-- Controls Row -->
                <div class="flex items-center justify-between gap-4">

                    <!-- Left Controls -->
                    <div class="flex items-center gap-3">
                        <!-- Play/Pause Button -->
                        <button id="btnPlayPause"
                            class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                            <svg id="iconPlay" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                            <svg id="iconPause" class="w-5 h-5 text-white hidden" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                            </svg>
                        </button>

                        <!-- Volume Controls -->
                        <div class="flex items-center gap-2">
                            <button id="btnMute"
                                class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors">
                                <svg id="iconVolumeOn" class="w-5 h-5 text-white" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                                </svg>
                                <svg id="iconVolumeOff" class="w-5 h-5 text-white hidden" fill="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                                </svg>
                            </button>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1"
                                class="w-20 h-1 bg-white/30 rounded-full appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-white">
                        </div>
                    </div>

                    <!-- Right Controls -->
                    <div class="flex items-center gap-3">
                        <!-- Quality Selector -->
                        <div class="relative">
                            <button id="btnQuality"
                                class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition-colors text-sm font-medium text-white">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 12H9.5v-2h-2v2H6V9h1.5v2.5h2V9H11v6zm7-1c0 .55-.45 1-1 1h-.75v1.5h-1.5V15H14c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v4zm-3.5-.5h2v-3h-2v3z" />
                                </svg>
                                <span id="currentQuality">Auto</span>
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M7 10l5 5 5-5z" />
                                </svg>
                            </button>

                            <!-- Quality Dropdown -->
                            <div id="qualityDropdown"
                                class="absolute bottom-full right-0 mb-2 py-2 bg-slate-800/95 backdrop-blur-sm rounded-lg shadow-xl border border-slate-700 min-w-[140px] hidden">
                                <button data-quality="auto" data-layer="-1"
                                    class="quality-option w-full px-4 py-2 text-left text-sm text-white hover:bg-white/10 transition-colors flex items-center justify-between">
                                    <span>Otomatik</span>
                                    <svg class="w-4 h-4 text-brand-500 checkmark hidden" fill="currentColor"
                                        viewBox="0 0 24 24">
                                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                                    </svg>
                                </button>
                                <div id="qualityOptions" class="border-t border-slate-700 mt-1 pt-1">
                                    <!-- Dynamic quality options will be inserted here -->
                                </div>
                            </div>
                        </div>

                        <!-- Fullscreen Button -->
                        <button id="btnFullscreen"
                            class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                            <svg id="iconFullscreenEnter" class="w-5 h-5 text-white" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                            </svg>
                            <svg id="iconFullscreenExit" class="w-5 h-5 text-white hidden" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Overlay for Join Button -->
            <div class="absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm z-10"
                id="joinOverlay">
                <button id="btnConsume"
                    class="bg-brand-600 hover:bg-brand-500 text-white font-bold py-4 px-8 rounded-full shadow-lg shadow-brand-500/30 transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Yayına Katıl
                </button>
            </div>

        </main>

        <footer class="text-center text-slate-600 text-sm">
            &copy; 2025 VELOSTREAM. Tüm hakları saklıdır.
        </footer>

    </div>

    <script>
        // Hide overlay when join is clicked
        document.getElementById('btnConsume').addEventListener('click', function () {
            document.getElementById('joinOverlay').style.display = 'none';
        });
    </script>
    <script type="module" src="viewer.js"></script>
</body>

</html>
