<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOSTREAM - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>console.warn = () => { };</script>
    <script type="importmap">
      {
        "imports": {
          "mediasoup-client": "https://esm.sh/mediasoup-client@3.18.1"
        }
      }
    </script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-5xl flex flex-col gap-6">

        <header class="text-center">
            <h1
                class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-purple-500 tracking-tight">
                VELOSTREAM
            </h1>
            <div id="status"
                class="mt-2 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-300 text-sm">
                <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                Yayına Hazır
            </div>
            <!-- Viewer Count Badge -->
            <div id="viewer-count-display"
                class="mt-2 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-400 text-sm ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                    <path fill-rule="evenodd"
                        d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                        clip-rule="evenodd" />
                </svg>
                <span id="count-span">0</span>
            </div>
        </header>

        <main
            class="bg-black rounded-2xl shadow-2xl overflow-hidden border border-slate-700 relative aspect-video group">

            <video id="remoteVideo" autoplay playsinline controls class="w-full h-full object-contain"></video>

            <!-- Overlay for Join Button (if needed initially) -->
            <div class="absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm z-10"
                id="joinOverlay">
                <button id="btnConsume"
                    class="bg-brand-600 hover:bg-brand-500 text-white font-bold py-4 px-8 rounded-full shadow-lg shadow-brand-500/30 transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Yayına Katıl
                </button>
            </div>

        </main>

        <footer class="text-center text-slate-600 text-sm">
            &copy; 2025 VELOSTREAM. Tüm hakları saklıdır.
        </footer>

    </div>

    <script>
        // Simple script to hide overlay when join is clicked
        document.getElementById('btnConsume').addEventListener('click', function () {
            document.getElementById('joinOverlay').style.display = 'none';
        });
    </script>
    <script type="module" src="viewer.js"></script>
</body>

</html>
