<!DOCTYPE html>
<html lang="tr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOSTREAM - Ekran Paylaşım Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: radial-gradient(ellipse at top, #0f172a 0%, #020617 60%); }
        .ctrl-btn { transition: all 0.15s ease; }
        .ctrl-btn:hover { transform: translateY(-1px); }
        .ctrl-btn:active { transform: translateY(0); }
        @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
        .modal-anim > div { animation: modalIn 0.2s ease; }
        input:focus, select:focus { box-shadow: 0 0 0 2px rgba(14,165,233,0.3); }
        @keyframes livePulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .live-dot { animation: livePulse 1.5s ease-in-out infinite; }
    </style>
</head>

<body class="text-slate-100 min-h-screen p-4 sm:p-6">

    <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <header class="text-center mb-8 sm:mb-10">
            <div class="inline-flex items-center gap-2 mb-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-400 via-brand-500 to-purple-500 tracking-tight">
                VELOSTREAM
            </h1>
            <p class="text-slate-400 mt-2 text-sm sm:text-base">Yüksek performanslı ekran paylaşım platformu</p>
        </header>

        <!-- Create Room Button -->
        <div class="flex justify-center mb-8">
            <button id="btnCreateRoom"
                class="bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-brand-600/20 transition-all ctrl-btn flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Oda Oluştur
            </button>
        </div>

        <!-- Room List Header -->
        <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold flex items-center gap-2">
                <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Aktif Odalar
            </h2>
            <span id="roomCount" class="text-slate-400 text-sm">0 oda</span>
        </div>

        <div id="roomList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
            <!-- Rooms will be inserted here -->
        </div>

        <div id="noRooms" class="text-center text-slate-500 py-16 hidden">
            <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-slate-800/50 flex items-center justify-center">
                <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <p class="text-base">Henüz aktif oda yok</p>
            <p class="text-sm mt-1 text-slate-600">İlk odayı sen oluştur!</p>
        </div>

        <!-- Footer -->
        <footer class="text-center text-slate-600 text-xs mt-12 pb-4">
            VELOSTREAM · WebRTC + Mediasoup SFU · Düşük gecikmeli ekran paylaşımı
        </footer>

    </div>

    <!-- Create Room Modal -->
    <div id="createModal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden items-center justify-center z-50 modal-anim">
        <div class="bg-slate-800 rounded-2xl p-7 w-full max-w-md mx-4 border border-slate-700/50 shadow-2xl">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-10 h-10 rounded-xl bg-brand-600/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </div>
                <h3 class="text-xl font-bold">Yeni Oda Oluştur</h3>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Oda Adı</label>
                    <input id="roomName" type="text" placeholder="Örn: Film İzleme Partisi"
                        class="w-full px-4 py-2.5 bg-slate-700/50 rounded-lg border border-slate-600/50 focus:border-brand-500 focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Senin Nickname'in</label>
                    <input id="createNickname" type="text" placeholder="Nickname (3-30 karakter)" maxlength="30"
                        class="w-full px-4 py-2.5 bg-slate-700/50 rounded-lg border border-slate-600/50 focus:border-brand-500 focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Şifre <span class="text-slate-600">(opsiyonel)</span></label>
                    <input id="roomPassword" type="password" placeholder="Boş bırakırsan herkese açık olur"
                        class="w-full px-4 py-2.5 bg-slate-700/50 rounded-lg border border-slate-600/50 focus:border-brand-500 focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Maksimum Kullanıcı</label>
                    <input id="roomMaxUsers" type="number" value="100" min="2" max="1000"
                        class="w-full px-4 py-2.5 bg-slate-700/50 rounded-lg border border-slate-600/50 focus:border-brand-500 focus:outline-none transition-colors">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button id="btnCancelCreate" class="flex-1 py-2.5 rounded-lg border border-slate-600/50 hover:bg-slate-700/50 transition-colors ctrl-btn">
                    İptal
                </button>
                <button id="btnConfirmCreate" class="flex-1 py-2.5 rounded-lg bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 font-semibold transition-all ctrl-btn">
                    Oluştur
                </button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="fixed inset-0 bg-black/85 backdrop-blur-md hidden items-center justify-center z-50 modal-anim">
        <div class="bg-slate-800 rounded-2xl p-7 w-full max-w-md mx-4 border border-slate-700/50 shadow-2xl">
            <div class="w-12 h-12 rounded-full bg-amber-500/20 flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h3 class="text-xl font-bold mb-1">Şifre Gerekli</h3>
            <p id="passwordRoomName" class="text-slate-400 mb-4 text-sm"></p>
            <input id="joinPassword" type="password" placeholder="Oda şifresi"
                class="w-full px-4 py-2.5 bg-slate-700/50 rounded-lg border border-slate-600/50 focus:border-brand-500 focus:outline-none transition-colors mb-2">
            <p id="passwordError" class="text-red-400 text-sm hidden"></p>
            <div class="flex gap-3 mt-4">
                <button id="btnCancelPassword" class="flex-1 py-2.5 rounded-lg border border-slate-600/50 hover:bg-slate-700/50 transition-colors ctrl-btn">İptal</button>
                <button id="btnConfirmPassword" class="flex-1 py-2.5 rounded-lg bg-brand-600 hover:bg-brand-500 font-semibold transition-all ctrl-btn">Katıl</button>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-xl shadow-2xl hidden z-50">
        <p id="toastMessage"></p>
    </div>

    <script src="lobby.js"></script>
</body>

</html>
