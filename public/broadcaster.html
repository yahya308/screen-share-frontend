<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELOSTREAM - Broadcaster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>
  <script type="importmap">
        {
            "imports": {
                "socket.io-client": "https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.esm.min.js",
                "mediasoup-client": "https://esm.sh/mediasoup-client@3.18.1?bundle"
            }
        }
    </script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center py-10 px-4 font-sans">

  <header class="mb-8 text-center">
    <h1
      class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-purple-500 tracking-tight">
      VELOSTREAM
    </h1>
    <p class="text-slate-400 mt-2 text-lg">Yüksek Performanslı Ekran Paylaşımı</p>
  </header>

  <main
    class="w-full max-w-4xl bg-slate-800/50 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">

    <!-- Controls Section -->
    <div class="p-6 md:p-8 border-b border-slate-700">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

        <!-- Resolution -->
        <div class="space-y-2">
          <label for="resSelect" class="block text-sm font-medium text-slate-300">Çözünürlük</label>
          <select id="resSelect"
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all">
            <option value="1080">1080p (FHD)</option>
            <option value="720" selected>720p (HD)</option>
            <option value="480">480p (SD)</option>
            <option value="360">360p</option>
            <option value="240">240p</option>
            <option value="144">144p</option>
          </select>
        </div>

        <!-- FPS -->
        <div class="space-y-2">
          <label for="fpsSelect" class="block text-sm font-medium text-slate-300">FPS (Kare Hızı)</label>
          <select id="fpsSelect"
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all">
            <option value="60">60 FPS</option>
            <option value="30" selected>30 FPS</option>
            <option value="24">24 FPS</option>
          </select>
        </div>

        <!-- Bitrate -->
        <div class="space-y-2">
          <label for="bitrateInput" class="block text-sm font-medium text-slate-300">Bitrate (kbps)</label>
          <div class="relative">
            <input type="number" id="bitrateInput" value="2500" min="1000" max="20000" step="500"
              class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all">
            <span class="absolute right-3 top-2.5 text-slate-500 text-sm">kbps</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-wrap gap-4 justify-center md:justify-start">
        <button id="btnStart"
          class="flex-1 md:flex-none bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 px-6 rounded-lg shadow-lg shadow-brand-500/20 transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M3 5a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2h-2.22l.9 1.348a1 1 0 01-.916 1.652H7.236a1 1 0 01-.916-1.652l.9-1.348H5a2 2 0 01-2-2V5zm11 1H6v8h8V6z"
              clip-rule="evenodd" />
          </svg>
          Yayını Başlat
        </button>

        <button id="btnStop" disabled
          class="flex-1 md:flex-none bg-red-600 hover:bg-red-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg shadow-lg shadow-red-500/20 transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z"
              clip-rule="evenodd" />
          </svg>
          Durdur
        </button>
      </div>

      <!-- Audio Controls -->
      <div class="mt-6 pt-6 border-t border-slate-700 flex flex-wrap gap-4 items-center">
        <button id="btnToggleMic" disabled
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"
              clip-rule="evenodd" />
          </svg>
          Mikrofon
        </button>

        <button id="btnToggleAudio" disabled
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.414z"
              clip-rule="evenodd" />
          </svg>
          Sistem Sesi
        </button>

        <div class="flex-1 min-w-[200px] flex items-center gap-3">
          <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Mikrofon Seviyesi</span>
          <div class="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
            <progress id="micVolume" value="0" max="100"
              class="w-full h-full [&::-webkit-progress-bar]:bg-slate-700 [&::-webkit-progress-value]:bg-brand-500 [&::-moz-progress-bar]:bg-brand-500"></progress>
          </div>
        </div>
      </div>
    </div>
    </div>

  </main>

  <footer class="mt-12 text-slate-500 text-sm">
    &copy; 2025 VELOSTREAM. Tüm hakları saklıdır.
  </footer>

  <script type="module" src="broadcaster.js"></script>
</body>

</html>
