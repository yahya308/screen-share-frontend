version: '3.8'

services:
  # Mediasoup Backend
  mediasoup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediasoup-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL certificates
    ports:
      - "3000:3000"           # HTTP/WebSocket (internal, proxied by nginx)
      - "40000-49999:40000-49999/udp"  # WebRTC UDP ports
    networks:
      - webrtc-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/webroot:/var/www/certbot:ro  # For certbot challenges
    depends_on:
      - mediasoup
    networks:
      - webrtc-network

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - webrtc-network

networks:
  webrtc-network:
    driver: bridge
